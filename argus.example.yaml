# Copy this to argus.yaml and replace the placeholder values.
# argus.yaml is gitignored because it contains camera credentials.

# Reolink fleets are commonly hybrid: some cameras answer directly on their own IP
# (standalone), others are reached only through an NVR on a channel. Argus generates
# go2rtc sources per camera. Verified rule of thumb (see LEARNINGS.md):
#   - RTSP paths should be CODEC-PREFIXED (h264Preview_0N_* / h265Preview_0N_main).
#     The bare Preview_0N form 404s on newer 4K/H.265 models (e.g. RLC-812A).
#   - H.264 sub streams work over bare HTTP-FLV; H.265 4K main streams need RTSP.
#   - FLV channel is 0-based (channelN); RTSP Preview is 1-based (Preview_0{N+1}).
cameras:
  # Standalone camera — host is the camera's own IP, channel 0.
  # A 4K model: set mainCodec: h265 so the main stream is served over RTSP.
  - name: "Backyard Left"
    host: 192.168.1.105
    channel: 0
    mainCodec: h265         # 4K H.265 main -> RTSP-only; omit/set h264 for 1080p models
    username: admin
    password: change-me
    transport: auto         # auto = FLV-sub primary; main = FLV(H.264) or RTSP(H.265)
    streams:
      main: main            # high-quality stream for recording
      sub: sub              # lower-quality stream for snapshots/prebuffer

  # NVR-fronted camera — host is the NVR; channel selects the camera on the NVR.
  - name: "Front L"
    host: 192.168.1.113     # the NVR's IP
    channel: 2              # NVR channel (RTSP path becomes h264Preview_03_*)
    mainCodec: h264         # the TRUE codec of the channel's main stream — probe it!
                            # 12MP D-series channels encode HEVC: set h265 (the NVR
                            # path name stays h264Preview_*, but FLV main must be
                            # skipped or the stream delivers nothing)
    username: admin
    password: change-me
    transport: auto
    streams:
      main: main
      sub: sub

recording:
  path: ./recordings
  retention:
    continuous: 3
    motion: 7
    alerts: 30

homekit:
  pin: "123-45-678"        # Change before real pairing

go2rtc:
  binary: ./go2rtc
  api_port: 1984

server:
  port: 8080
